apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shopstack-postgres
  namespace: shopstack
spec:
  serviceName: shopstack-postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: shopstack-postgres
  template:
    metadata:
      labels:
        app: shopstack-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: shopstack-postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: shopstack-postgres-pvc